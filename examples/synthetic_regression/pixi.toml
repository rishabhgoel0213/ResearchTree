[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.10.*"
pip = "*"

[pypi-dependencies]
numpy = "*"
torch = "==2.10"

[tasks]
check-python = "python -c \"import os, sysconfig; inc = sysconfig.get_paths()['include']; print(inc); print('Python.h:', os.path.exists(os.path.join(inc, 'Python.h')))\""
train = "python src/train.py"
