[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.10.*"
pip = "*"

[pypi-dependencies]
numpy = "*"
tqdm = "*"
torch = "==2.10"
huggingface-hub = "*"
kernels = "*"
setuptools = "*"
typing-extensions = "==4.15.0"
datasets = "*"
tiktoken = "*"
sentencepiece = "*"

[tasks]
check-python = "python -c \"import os, sysconfig; inc = sysconfig.get_paths()['include']; print(inc); print('Python.h:', os.path.exists(os.path.join(inc, 'Python.h')))\""
download-data = "python data/cached_challenge_fineweb.py --variant sp1024"
train = "torchrun --standalone --nproc_per_node=1 src/train_gpt.py"
